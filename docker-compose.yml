services:
  qdrant:
    container_name: meow-qdrant
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  mysql:
    container_name: meow-mysql
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: meow
      MYSQL_USER: meow
      MYSQL_PASSWORD: meow
      MYSQL_CHARSET: utf8mb4
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  # app:
  #   container_name: meow-app
  #   build: .
  #   ports:
  #     - "8000:8000"
  #   env_file: .env
  #   depends_on:
  #     - qdrant
  #     - mysql

volumes:
  qdrant_data:
  mysql_data:
