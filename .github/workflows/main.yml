name: CI/CD Pipeline
on:
  push:
    branches: [ "main" ]
jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/meow-content:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
    - name: Connect to Tailscale
      uses: tailscale/github-action@v4
      with:
        oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
        oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
        tags: tag:ci

    - name: Deploy to homelab via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_TS_IP }}
        username: deploy
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          docker stop meow-content meow-streamlit || true
          docker rm meow-content meow-streamlit || true

          echo "${{ secrets.ENV_FILE_CONTENT }}" > .env.tmp

          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/meow-content:latest

          docker run -d \
            --name meow-content \
            --network meow-network \
            -v ~/meow-content/images:/code/app/images \
            --env-file .env.tmp \
            -e TZ=Asia/Seoul \
            ${{ secrets.DOCKERHUB_USERNAME }}/meow-content:latest

          docker run -d \
            --name meow-streamlit \
            --network meow-network \
            --env-file .env.tmp \
            -e TZ=Asia/Seoul \
            -e API_BASE_URL=http://meow-content:8000 \
            ${{ secrets.DOCKERHUB_USERNAME }}/meow-content:latest \
            streamlit run view/meme_inspection.py --server.port 8501 --server.address 0.0.0.0 --server.baseUrlPath /admin

          rm -f .env.tmp